[build]
target = "avr-none"
rustflags = [
    "-C", "target-cpu=atmega32u4",
    "-C", "link-arg=-Wl,--defsym=__TEXT_REGION_LENGTH__=28k",
]

[target.'cfg(target_arch = "avr")']
runner = "ravedude leonardo -cb 57600 -P /dev/cu.usbmodem101" # cu.usbmodem101 for macos

[unstable]
build-std = ["core"]
